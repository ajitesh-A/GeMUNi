services:
  - type: web
    name: gemuni-ai-engine
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r services/ai-engine/requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    rootDir: services/ai-engine
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        value: deepseek/deepseek-chat
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
